services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-image-app
    restart: unless-stopped
    ports:
      - "8080:80"
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/backend/logs
      - ./backend/.env:/app/backend/.env:ro
