services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-image-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      DATABASE_URL: "mysql+pymysql://root:123456@host.docker.internal:3306/ai-image"
      JWT_SECRET_KEY: "change-this-to-a-random-secret-key-at-least-32-characters"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRE_MINUTES: "10080"
      API_GATEWAY_BASE_URL: ""
      API_GATEWAY_API_KEY: ""
      QINIU_ACCESS_KEY: ""
      QINIU_SECRET_KEY: ""
      QINIU_BUCKET: ""
      QINIU_DOMAIN: ""
      QINIU_REGION_ID: ""
      QINIU_PRIVATE_BUCKET: "false"
      QINIU_PRIVATE_URL_EXPIRES: "3600"
      APP_NAME: "AI创作平台"
      APP_VERSION: "1.0.0"
      DEBUG: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/backend/logs
